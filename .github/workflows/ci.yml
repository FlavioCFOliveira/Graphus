name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # macOS's default temp dir (/var/folders/.../T) is long enough that a UDS socket path built under it
  # overflows the platform `sun_path` limit (~104 bytes), so every integration test that binds a Unix
  # domain socket fails to boot on macos-14 with "path must be shorter than SUN_LEN". Point the temp dir
  # at the short /tmp (`std::env::temp_dir()` honours `$TMPDIR` on Unix) so socket paths stay under the
  # limit on every leg; a no-op on Linux, where `temp_dir()` is already /tmp.
  TMPDIR: /tmp

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Tier-1 target matrix (decision D-target-matrix): x86_64 Linux,
        # aarch64 Linux, and aarch64 macOS (Apple Silicon).
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --all-targets
      - name: Test
        run: cargo test --all
      # DST crash-recovery soak gate (rmp #468/#471/#480): the three large-seed crash + ARIES recovery
      # sweeps that pin the dead-link-corpse class (#468/#172/#301) and recovery idempotency closed —
      # interleaved self-loop incidence-chain churn (10k seeds), interleaved property-chain churn (10k
      # seeds), and crash-during-recovery double-crash idempotency (6k seeds). They run on every OS leg
      # in debug via `cargo test --all` above; this names them as an explicit, always-on standing gate
      # and re-runs them in release (optimised paths) on the x86_64 Linux leg. No `#[ignore]`, no skips.
      - name: DST crash-recovery soaks
        if: matrix.os == 'ubuntu-latest'
        run: >
          cargo test --release -p graphus-dst
          --test selfloop_churn_recovery
          --test property_churn_recovery
          --test double_crash_recovery
      # Deterministic Simulation Testing gate (rmp #244): a fast, bounded VOPR seed sweep asserting
      # every seed is SAFE (strict serializability + durability + atomicity + reference-model
      # equivalence under injected disk/clock/crash faults), LIVE (progress watchdog + fault-then-heal
      # recovery), and deterministic + oracle-consistent. Any violation, non-determinism, or oracle
      # divergence fails the PR. Bounded (256 seeds/mode) so it stays a quick gate; the nightly job
      # soaks far deeper. Runs once on the x86_64 Linux leg to keep the matrix fast.
      - name: DST safety sweep
        if: matrix.os == 'ubuntu-latest'
        run: cargo run --release -p graphus-dst --bin graphus-dst -- vopr safety --seed 1 --seeds 256
      - name: DST liveness sweep
        if: matrix.os == 'ubuntu-latest'
        run: cargo run --release -p graphus-dst --bin graphus-dst -- vopr liveness --seed 1 --seeds 256
      - name: DST determinism + reference-model sweep
        if: matrix.os == 'ubuntu-latest'
        run: cargo run --release -p graphus-dst --bin graphus-dst -- vopr --seed 1 --seeds 256

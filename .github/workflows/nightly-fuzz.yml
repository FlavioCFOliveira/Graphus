name: Nightly DST fuzz

# Long-running Deterministic Simulation Testing soak (rmp #244, D3). Every night the VOPR fuzzer
# runs for a wall-clock budget, swarming the full simulator configuration per seed (clients, pool
# size, mix, fault/crash budget, latency) so each seed explores a different environment at
# hyper-speed. On any failing seed it persists a self-contained replay artifact (seed + full config
# + expected trace/state hashes) that reproduces the exact failure via `vopr-repro --replay`; the
# job uploads those artifacts and fails. Can also be dispatched manually.

on:
  schedule:
    # 03:17 UTC daily (off the hour to avoid the cron stampede).
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      secs:
        description: "Wall-clock soak budget per mode, in seconds"
        required: false
        default: "1200"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  soak:
    name: VOPR soak (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [safety, liveness, standard]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Build fuzzer (release)
        run: cargo build --release -p graphus-dst --bin graphus-dst
      - name: Soak
        run: |
          mkdir -p dst-artifacts
          ./target/release/graphus-dst vopr fuzz \
            --mode ${{ matrix.mode }} \
            --swarm \
            --secs ${{ github.event.inputs.secs || '1200' }} \
            --keep-going \
            --write-artifacts dst-artifacts
      - name: Upload replay artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: dst-replay-artifacts-${{ matrix.mode }}
          path: dst-artifacts/
          if-no-files-found: ignore

  # The threaded concurrency lane (rmp #460): the named owner of the parallel-race class that the
  # deterministic simulator cannot see (off-thread reader pool, morsel fan-out, ConcurrentBufferPool
  # sweep, evictors, the DWB ring). Runs the real-OS-thread tests under ThreadSanitizer on the nightly
  # toolchain. It is NON-DETERMINISTIC and SOAK-ONLY — deliberately NOT part of the byte-identical
  # seed-replay gate (see specification/07-dst-simulator.md §5.1 / §13).
  tsan-soak:
    name: ThreadSanitizer threaded concurrency lane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install nightly + rust-src (ThreadSanitizer needs an instrumented std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Run the ThreadSanitizer soak lane
        # The script sets its own RUSTFLAGS for `-Z sanitizer=thread`; halt_on_error fails fast on any
        # detected data race. It never feeds the deterministic gate.
        run: scripts/tsan-soak.sh

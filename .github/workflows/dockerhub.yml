name: Docker Hub

# Build and publish the multi-architecture Graphus container image
# (linux/amd64 + linux/arm64) to Docker Hub.
#
# Triggers are INTENTIONALLY restricted to two — this workflow never runs on
# ordinary pushes or pull requests:
#
#   * workflow_dispatch    → manual, on-demand publish of a specific version (required input)
#   * release: published   → automatic publish when a GitHub Release is published
#
# Either way the image is published with CONFORMANT tags ONLY — `:latest` plus a
# `:vX.Y.Z` version tag. There is no sha/edge/branch fallback: a publish that would
# not carry a version tag is treated as a configuration error and fails fast.
#
# The companion `docker.yml` workflow keeps the Dockerfile green on every change
# and publishes to the GitHub Container Registry (GHCR); this one targets Docker Hub.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   * DOCKERHUB_USERNAME — Docker Hub account/namespace and login username
#   * DOCKERHUB_TOKEN    — a Docker Hub Access Token (create one under your Docker
#                          Hub account settings; do NOT use the account password)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, e.g. 0.0.3 (semver, no leading 'v'). Publishes :vX.Y.Z and :latest."
        required: true
        type: string
  release:
    types: [published]

# Never cancel an in-flight publish — a half-pushed multi-arch manifest is worse
# than waiting. Serialise per ref instead.
concurrency:
  group: dockerhub-${{ github.ref }}
  cancel-in-progress: false

# Docker Hub auth uses the secrets below, so no elevated GITHUB_TOKEN scope is
# needed; read-only access to the repository contents is enough to check it out.
permissions:
  contents: read

env:
  # The published reference is docker.io/<DOCKERHUB_USERNAME>/<IMAGE_REPO>. The
  # namespace is taken from the secret at run time; only the repository name is
  # set here. If you publish under a Docker Hub organisation whose name differs
  # from the login user, change the `images:` value in the metadata step below.
  IMAGE_REPO: graphus
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  publish:
    name: Build and publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
      # A dispatch must name a concrete semver version up front, so Docker Hub can
      # never receive a non-conformant (sha/branch) tag via the manual path.
      - name: Validate the dispatch version is semver
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::The 'version' input must be semver like 0.0.3 (no leading v); got '$VERSION'."
            exit 1
          fi
          echo "Publishing version v$VERSION."

      - name: Checkout
        uses: actions/checkout@v7

      # Fail fast with a clear message if run on a fork or before the secrets are
      # configured, instead of erroring opaquely deep inside the login step.
      - name: Verify Docker Hub credentials are configured
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::The DOCKERHUB_USERNAME and/or DOCKERHUB_TOKEN repository secrets are not set. Configure them under Settings -> Secrets and variables -> Actions before running this workflow."
            exit 1
          fi
          echo "Docker Hub credentials are present."

      # QEMU lets the runner build the non-native (arm64) image under emulation.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          # registry defaults to docker.io (Docker Hub) when omitted.
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPO }}
          # CONFORMANT TAGS ONLY — every publish carries :vX.Y.Z + :latest, never a
          # sha or branch tag:
          #   * release  → the git tag (refs/tags/vX.Y.Z) feeds pattern=v{{version}};
          #                `latest` moves for a final (non-prerelease) release.
          #   * dispatch → the required, semver-validated `version` input feeds
          #                :v<version>, and `latest` moves too (an operator publishing
          #                a version on purpose).
          tags: |
            type=semver,pattern=v{{version}},enable=${{ github.event_name == 'release' }}
            type=raw,value=v${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ (github.event_name == 'release' && !github.event.release.prerelease) || github.event_name == 'workflow_dispatch' }}

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Supply-chain attestations, matching the GHCR workflow.
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        run: |
          {
            echo "### Published to Docker Hub"
            echo ""
            echo "**Digest:** \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

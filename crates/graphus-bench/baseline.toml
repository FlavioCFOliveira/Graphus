# Graphus benchmark regression-gate baseline (`rmp` task #27).
#
# Per-metric median latency in nanoseconds, recorded from a RELEASE build on the
# machine class noted below. The `bench_gate` binary fails CI if a measured metric
# regresses past `tolerance`. Re-seed with `bench_gate --update` after an intentional
# perf change, on a quiet release build, and commit the new numbers.
#
# Machine class: see RESULTS.md §1 (recorded there alongside the Criterion numbers).

tolerance = 0.2

[metrics]
# commit_short_txn: 4-op write transaction commit (median)
commit_short_txn_ns = 4330
# scan_1k_nodes: full node-store scan of 1000 nodes (median)
scan_1k_nodes_ns = 21651

# ----------------------------------------------------------------------------
# LDBC-SNB-flavoured macro harness baseline (`rmp` task #78).
#
# A documented, RELATIVE Graphus-vs-Graphus regression signal for representative
# operations of the broadened IS/IC/BI catalog, captured with
#   cargo run -p graphus-bench --release --bin ldbc_snb
# on the machine class in RESULTS.md §1 (rustc 1.96.0, Ryzen 9 5900HX, Linux 6.8),
# tiny scale (174 nodes / 670 rels), each operation timed over 200 invocations.
#
# OFFLINE SCOPE: these are NOT official LDBC results and are NOT a CI gate (the
# `[metrics]` section above is the only gated micro-baseline). Correctness is
# verified separately, against the deterministic generator's ground truth, by
# `cargo test -p graphus-bench` (src/ldbc/correctness.rs). See RESULTS.md §9 and
# LDBC.md. Re-capture after an intentional engine change and update p50 below.
[ldbc_snb]
# p50 latency (microseconds) for three representative shapes of the catalog.
# IS1-profile: id-anchored point read (property-index seek active).
is1_profile_p50_us = 779.0
# IC-fof: 2-hop friends-of-friends DISTINCT traversal (the canonical SNB shape).
ic_fof_p50_us = 2129.4
# IU-comment: insert a comment on a post (the short write transaction).
iu_comment_p50_us = 13606.8
